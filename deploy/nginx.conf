events {}

http {
  upstream gwx_app {
    server localhost:3000;
  }

  server {
    listen 80;
    server_name neuroglitch.ai www.neuroglitch.ai;

    location / {
      proxy_pass http://gwx_app;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # SSL — filled in by certbot
    # server {
    #   listen 443 ssl;
    #   server_name neuroglitch.ai www.neuroglitch.ai;
    #   ssl_certificate /etc/letsencrypt/live/neuroglitch.ai/fullchain.pem;
    #   ssl_certificate_key /etc/letsencrypt/live/neuroglitch.ai/privkey.pem;
    # }
  }
}
